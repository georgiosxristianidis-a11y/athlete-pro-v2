<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Athlete Pro</title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --c-bg: #000000;
            --c-text-1: #ffffff;
            --c-text-2: #a0a0a0;
            --c-accent: #ff3b30;
            --c-surface: #1c1c1e;
            --c-border: #2c2c2e;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--c-bg);
            color: var(--c-text-1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--c-border);
        }
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .btn {
            background-color: var(--c-accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Athlete Pro</h1>
        </header>
        <main id="main-content">
            <p>Загрузка...</p>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
