<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050507" />
    <meta name="description" content="Professional PPL workout tracker" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Athlete Pro" />

    <title>Athlete Pro</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;800&family=Manrope:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── BLOCK 0: Critical CSS (inline — zero flash) ──────────────── -->
    <style>
      /* RESET */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        height: 100dvh;
        overflow: hidden;
      }
      body {
        height: 100%;
        font-family: 'Manrope', sans-serif;
        font-feature-settings: 'cv11', 'ss01';
        font-variant-numeric: tabular-nums;
        background: #050507;
        color: #ffffff;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        user-select: none;
      }

      /* DESIGN TOKENS */
      :root {
        --font-main: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-heading: 'Instrument Sans', sans-serif;
        --side-padding: 20px;
        --c-bg: #050507;
        --c-text-1: #ffffff;
        --c-text-2: #a1a1aa;
        --c-text-3: #71717a;
        --c-accent: #00e676;
        --c-accent-bg: rgba(0, 230, 118, 0.12);
        --c-purple: #a78bfa;
        --c-purple-bg: rgba(167, 139, 250, 0.12);
        --c-blue: #60a5fa;
        --c-blue-bg: rgba(96, 165, 250, 0.12);
        --c-red: #ff4d88;
        --c-red-bg: rgba(255, 77, 136, 0.12);
        --c-border: rgba(255, 255, 255, 0.08);
        --nav-h: 72px;
        --sp-1: 8px; --sp-2: 16px; --sp-3: 24px; --sp-4: 32px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* SHELL */
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* STATUS BAR — Elite Glassmorphism */
      #status-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        padding: var(--safe-top) var(--sp-2) 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(5, 5, 7, 0.75);
        backdrop-filter: blur(20px) saturate(1.8);
        -webkit-backdrop-filter: blur(20px) saturate(1.8);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        z-index: 1000;
      }
      .status-logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .status-logo-img {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        object-fit: cover;
      }
      .status-logo-text {
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: inline-flex;
        gap: 5px;
        align-items: baseline;
      }
      .logo-w1 { color: var(--c-text-1); font-weight: 800; }
      .logo-w2 { color: var(--c-accent); font-weight: 900; letter-spacing: 0.12em; text-shadow: 0 0 12px rgba(0, 230, 118, 0.35); }

      /* Status Pill */
      .status-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--c-border);
        font-size: 10px;
        font-weight: 700;
        color: var(--c-text-1);
        text-transform: uppercase;
        opacity: 0.8;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--c-text-3);
      }
      .status-pill.online .status-dot { background: var(--c-accent); box-shadow: 0 0 6px var(--c-accent); }
      .status-pill.offline .status-dot { background: var(--c-red); }

      #status-time {
        font-size: 11px;
        font-weight: 700;
        color: var(--c-text-1);
        font-variant-numeric: tabular-nums;
        opacity: 0.8;
      }

      /* SCREENS */
      #screens {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      .screen {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 72px var(--sp-2) 120px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(12px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        -webkit-overflow-scrolling: touch;
      }
      .screen.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      /* BOTTOM NAV */
      #nav {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(var(--nav-h) + var(--safe-bottom));
        padding-bottom: var(--safe-bottom);
        background: rgba(10, 10, 15, 0.85);
        backdrop-filter: blur(32px) saturate(1.8);
        -webkit-backdrop-filter: blur(32px) saturate(1.8);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: flex-start;
        z-index: 1000;
      }
      .nav-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        height: var(--nav-h);
        cursor: pointer;
        border: none;
        background: none;
        color: var(--c-text-3);
        transition: all 0.2s ease;
      }
      .nav-btn svg { width: 24px; height: 24px; stroke-width: 1.5; }
      .nav-btn.active { color: var(--c-accent); }
      .nav-btn:active svg { transform: scale(0.8); }

      /* LOADING */
      #loading {
        position: fixed; inset: 0; background: #050507;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9000; transition: opacity 0.5s ease;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      /* Avatar Btn */
      .athlete-avatar-btn {
        width: 32px; height: 32px; border-radius: 10px;
        background: var(--c-accent-bg); border: 1px solid rgba(0, 230, 118, 0.2);
        color: var(--c-accent); font-size: 13px; font-weight: 800; cursor: pointer;
      }
    </style>

    <!-- Design system & screen styles -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/workout.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/analytics.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/profile.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/body-stats.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/dynamic-island.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/privacy.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/claude.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/athlete-room.css" media="print" onload="this.media='all'" />
  </head>

  <body>
    <div id="loading">
      <div style="width:80px;height:80px;border-radius:24px;background:var(--c-accent-bg);display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite">
        <img src="icons/icon-192.png" style="width:48px;height:48px;border-radius:12px" alt="AP" />
      </div>
    </div>

    <div id="app">
      <div id="status-bar">
        <div class="status-logo">
          <img src="icons/icon-192.png" class="status-logo-img" alt="AP" />
          <span class="status-logo-text"><span class="logo-w1">Athlete</span><span class="logo-w2">Pro</span></span>
        </div>
        <div id="status-pill" class="status-pill offline" 
             ondblclick="window.PrivacyRapid?.toggle()"
             onpointerdown="window.PrivacyRapid?.startLongPress(event)"
             onpointerup="window.PrivacyRapid?.cancelLongPress()"
             onpointerleave="window.PrivacyRapid?.cancelLongPress()"
             style="cursor:pointer">
          <span class="status-dot"></span>
          <span id="status-text">Offline</span>
        </div>
        <div id="privacy-indicator" class="privacy-indicator" hidden></div>
        <span id="status-time"></span>
        <button id="athlete-avatar-btn" class="athlete-avatar-btn" onclick="window.AthleteRoom.open()">
          <span id="athlete-avatar-initials">A</span>
        </button>
      </div>

      <div id="screens">
        <div id="s-home" class="screen active"></div>
        <div id="s-train" class="screen"></div>
        <div id="s-stats" class="screen"></div>
        <div id="s-body" class="screen"><div id="body-stats-root"></div></div>
        <div id="s-profile" class="screen"></div>
      </div>

      <nav id="nav">
        <button class="nav-btn active" data-s="s-home" onclick="Nav.go('s-home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" /></svg>
        </button>
        <button class="nav-btn" data-s="s-train" onclick="Nav.go('s-train',{force:true})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="6.5" y1="12" x2="17.5" y2="12" /><rect x="3" y="9" width="3" height="6" rx="1" /><rect x="18" y="9" width="3" height="6" rx="1" /><line x1="2" y1="11" x2="2" y2="13" /><line x1="22" y1="11" x2="22" y2="13" /></svg>
        </button>
        <button class="nav-btn" data-s="s-stats" onclick="Nav.go('s-stats')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>
        </button>
        <button class="nav-btn" data-s="s-profile" onclick="Nav.go('s-profile')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </nav>
      <div id="athlete-room" class="athlete-room-overlay"></div>
    </div>

    <div id="toast-wrap" role="status" aria-live="polite"></div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
